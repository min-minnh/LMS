<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LMS - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { display: flex; min-height: 100vh; background: #f8fafc; color: #0f172a; }
    
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e2e8f0; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar .logo { font-weight: 700; font-size: 24px; margin-bottom: 40px; color: #1e293b; display: flex; align-items: center; gap: 10px; }
    .sidebar .logo span { width: 32px; height: 32px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .sidebar a { display: flex; align-items: center; gap: 12px; margin: 8px 0; padding: 12px 16px; color: #64748b; text-decoration: none; cursor: pointer; border-radius: 12px; transition: all 0.2s ease; font-size: 15px; font-weight: 500; }
    .sidebar a:hover { background: #f1f5f9; color: #1e293b; }
    .sidebar a.active { background: #ffedd5; color: #ea580c; }
    
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .header { margin-bottom: 30px; }
    .header h1 { font-size: 30px; font-weight: 700; color: #ea580c; }

    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
    .admin-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .admin-card h3 { color: #1e293b; margin-bottom: 24px; font-size: 18px; font-weight: 700; }

    label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    input, textarea, select { display: block; width: 100%; margin-bottom: 20px; padding: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; outline: none; font-size: 15px; transition: 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; background: #ffffff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    
    button { padding: 12px 24px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><span>A</span> AstraLMS</div>
  <a onclick="go('dashboard')">🏠 Dashboard</a>
  <a onclick="go('vocab')">📚 Vocabulary</a>
  <a onclick="go('lesson')">📖 Lessons</a>
  <a onclick="go('results')">📊 My Results</a>
  <a onclick="go('admin')" class="active">⚙️ Admin Control Panel</a>
  <div style="flex-grow: 1;"></div>
  <a onclick="logout()" style="color: #ef4444;">🚪 Logout</a>
</div>

<div class="main">
  <div class="header">
    <h1>Admin Dashboard</h1>
    <p style="color: #64748b; margin-top: 8px;">Upload data to populate the platform.</p>
  </div>

  <div class="admin-grid">
    <div class="admin-card">
      <h3>📖 Add a New Lesson</h3>
      <label>Lesson Title</label>
      <input id="lesson-title" placeholder="e.g. Introduction to Astronomy">
      
      <label>Lesson Content</label>
      <textarea id="lesson-content" placeholder="Full text content here..." rows="5"></textarea>
      
      <label>Header Image URL (Optional)</label>
      <input id="lesson-img" placeholder="https://example.com/img.jpg">
      
      <button onclick="addLesson()">Publish Lesson</button>
    </div>

    <div>
      <div class="admin-card" style="margin-bottom: 30px;">
        <h3>🧠 Import Quiz via CSV</h3>
        <label>Select Target Lesson</label>
        <select id="lesson-select">
          <option value="">Loading lessons...</option>
        </select>
        
        <p style="font-size: 13px; margin-bottom: 12px; color: #64748b; line-height: 1.5;">
          <strong>CSV Format:</strong><br> 
          <code>Question,Opt A,Opt B,Opt C,Opt D,CorrectAnswer</code>
        </p>
        <input type="file" id="quiz-csv" accept=".csv" style="background: transparent; border: 1px dashed #cbd5e1; padding: 20px;">
        
        <button onclick="uploadQuizCSV()">Upload Quizzes</button>
      </div>

      <div class="admin-card">
        <h3>📚 Add Vocabulary Word</h3>
        <label>Word</label>
        <input id="vocab-word" placeholder="e.g. Constellation">
        <label>Meaning</label>
        <input id="vocab-meaning" placeholder="A group of stars...">
        <button onclick="addVocab()">Add Word</button>
      </div>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
const userStr = localStorage.getItem("user");
if (!token || !userStr) window.location.href = "index.html";

const user = JSON.parse(userStr);
if (user.role !== 'admin') {
  alert("Access Denied: Admins only");
  window.location.href = "dashboard.html";
}

function go(page) { window.location.href = page + ".html"; }
function logout() { localStorage.clear(); window.location.href = "index.html"; }

async function fetchLessons() {
  try {
    const res = await fetch('http://localhost:3000/lessons', { headers: { 'Authorization': 'Bearer ' + token }});
    const lessons = await res.json();
    const sel = document.getElementById('lesson-select');
    sel.innerHTML = '<option value="">-- Choose Lesson --</option>';
    lessons.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l._id; opt.innerText = l.title;
      sel.appendChild(opt);
    });
  } catch(err) { console.error(err); }
}

async function addLesson() {
  const title = document.getElementById('lesson-title').value;
  const content = document.getElementById('lesson-content').value;
  const imageUrl = document.getElementById('lesson-img').value;
  if (!title || !content) return alert("Title and Content are required");

  try {
    await fetch('http://localhost:3000/lessons', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ title, content, imageUrl })
    });
    alert("Lesson published successfully!");
    document.getElementById('lesson-title').value = '';
    document.getElementById('lesson-content').value = '';
    document.getElementById('lesson-img').value = '';
    fetchLessons();
  } catch(err) { console.error(err); }
}

async function addVocab() {
  const word = document.getElementById('vocab-word').value;
  const meaning = document.getElementById('vocab-meaning').value;
  if(!word || !meaning) return alert("Word and Meaning required");
  
  try {
    await fetch('http://localhost:3000/vocab', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ word, meaning })
    });
    alert("Vocabulary added!");
    document.getElementById('vocab-word').value = '';
    document.getElementById('vocab-meaning').value = '';
  } catch(err) { console.error(err); }
}

function uploadQuizCSV() {
  const lessonId = document.getElementById('lesson-select').value;
  if(!lessonId) return alert("Please select a lesson first!");
  
  const fileInput = document.getElementById('quiz-csv');
  if(!fileInput.files.length) return alert("Please select a CSV file!");

  Papa.parse(fileInput.files[0], {
    header: false,
    skipEmptyLines: true,
    complete: async function(results) {
      const data = results.data;
      const payload = data.map(row => {
        return {
          lessonId: lessonId,
          question: row[0],
          options: [row[1], row[2], row[3], row[4]],
          correctAnswer: row[5]
        }
      });

      try {
        await fetch('http://localhost:3000/quizzes', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        alert("Quizzes imported and linked successfully!");
        fileInput.value = "";
      } catch(err) { console.error(err); alert("Failed to import"); }
    }
  });
}

fetchLessons();
</script>

</body>
</html>
