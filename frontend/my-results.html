<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraLMS - Lịch Sử Làm Bài</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
    /* Specific overrides for My Results */
    tr.result-row {
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    tr.result-row:hover {
      background: var(--bg-hover);
    }

    /* Modal styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .modal-content {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .modal-header {
      padding: 32px 40px;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .detail-card {
      background: var(--bg-surface);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    .detail-card.correct-q {
      border-color: #A7F3D0;
      background: #ECFDF5;
    }
    .detail-card.wrong-q {
      border-color: #FECACA;
      background: #FEF2F2;
    }

    .q-title {
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 16px;
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opt-row {
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
      background: white;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
    }
    .opt-correct {
      background: #D1FAE5;
      border-color: #10B981;
      color: #065F46;
      font-weight: 600;
    }
    .opt-wrong {
      background: #FEE2E2;
      border-color: #EF4444;
      color: #991B1B;
      font-weight: 600;
    }
    .opt-selected-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: rgba(0, 0, 0, 0.1);
      margin-left: 12px;
    }

    .passage-review-box {
      background: var(--primary-light);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9375rem;
      color: var(--text-main);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .passage-review-label {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar-slim">
    <img src="assets/images/female_student.png" alt="Avatar" class="char-avatar" id="sidebar-avatar" onerror="this.style.display='none'">
    <a href="#" class="nav-icon" onclick="go('student-dashboard')" title="Dashboard"><i class='bx bxs-home'></i></a>
    <a href="#" class="nav-icon" onclick="go('vocab')" title="Vocabulary"><i class='bx bx-book-bookmark'></i></a>
    <a href="#" class="nav-icon" onclick="go('lesson')" title="Theory"><i class='bx bx-play-circle'></i></a>
    <a href="#" class="nav-icon" onclick="go('quizzes-student')" title="Quizzes"><i class='bx bx-edit'></i></a>
    <a href="#" class="nav-icon active" onclick="go('my-results')" title="My Results"><i class='bx bx-bar-chart-alt-2'></i></a>
    <div class="sidebar-bottom">
      <a href="#" id="admin-link" class="nav-icon" style="display:none;" onclick="go('dashboard')" title="Admin"><i class='bx bx-cog'></i></a>
      <a href="#" class="nav-icon" onclick="logout()" title="Logout" style="color:#f43f5e;"><i class='bx bx-power-off'></i></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-area">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
      <div>
        <h1 style="font-size:1.5rem; font-weight:800; margin:0; color:#0f172a; display:flex; align-items:center; gap:8px;">
          <i class='bx bx-bar-chart-square' style="color:#0ea5e9;"></i> My Results
        </h1>
        <p style="color:#64748b; margin:4px 0 0; font-size:0.9rem;">View quiz scores and review detailed answers.</p>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#0ea5e9,#38bdf8); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem;" id="user-avatar">S</div>
        <span style="font-weight:600; color:#0f172a;" id="user-name-top">Student</span>
      </div>
    </div>

      <div class="card p-0 table-responsive">

        <table id="dataTable">
          <thead>
            <tr>
              <th>Tên bài kiểm tra</th>
              <th>Điểm số</th>
              <th>Thời gian nộp bài</th>
              <th width="150">Thao tác</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="4" style="text-align:center; color: var(--text-muted);">
                <i class='bx bx-loader-alt bx-spin'></i> Đang tải dữ liệu...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="font-bold text-xl text-primary" id="modalTitle">Chi tiết bài thi</div>
      <button class="btn-icon" onclick="closeModal()"><i class='bx bx-x text-2xl'></i></button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="flex justify-center"><i class='bx bx-loader-alt bx-spin text-3xl text-primary'></i></div>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'https://lms-gzty.onrender.com';

  const token = localStorage.getItem("token");
  const userStr = localStorage.getItem("user");
  if (!token || !userStr) window.location.href = "index.html";

  const user = JSON.parse(userStr);
  if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

  const displayName = user.name || (user.email ? user.email.split('@')[0] : 'Student');
  document.getElementById('user-name-top').innerText = displayName;
  document.getElementById('user-avatar').innerText = displayName.charAt(0).toUpperCase();

  // Set gender avatar — from user.gender, default male
  function getGenderImg(g) {
    const v = (g || 'male').toLowerCase();
    return (v === 'female' || v === 'girl') ? 'assets/images/female_student.png' : 'assets/images/male_student.png';
  }
  const sidebarAvatar = document.getElementById('sidebar-avatar');
  if (sidebarAvatar) { sidebarAvatar.src = getGenderImg(user.gender); sidebarAvatar.onerror = () => sidebarAvatar.style.display='none'; }

  function logout() { localStorage.clear(); window.location.href = "index.html"; }
  function go(page) { window.location.href = page + ".html"; }

  async function apiFetch(path) {
    const res = await fetch(BASE_URL + path, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    return res.json();
  }

  function escapeHTML(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  async function fetchMyResults() {
    try {
      const data = await apiFetch('/results?limit=100');
      const tbody = document.getElementById('tableBody');

      if (!data.success || !data.data || !data.data.results || data.data.results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--text-muted);"><i class="bx bx-info-circle"></i> Chưa có kết quả nào. Hãy làm bài kiểm tra trước!</td></tr>';
        return;
      }

      tbody.innerHTML = data.data.results.map(r => {
        const isPass = r.score >= 5;
        const badgeClass = isPass ? 'badge-success' : 'badge-danger';
        const dateStr = r.submittedAt ? new Date(r.submittedAt).toLocaleString() : 'Chưa nộp';
        return `
          <tr class="result-row" onclick="viewDetails('${r._id}')">
            <td><strong class="text-primary">${r.quizId?.title || 'Unknown Quiz'}</strong></td>
            <td><span class="badge ${badgeClass}">${r.score} / 10</span></td>
            <td class="text-muted text-sm">${dateStr}</td>
            <td><button class="btn btn-secondary btn-sm" style="padding: 6px 12px; font-size: 13px;">Xem chi tiết <i class='bx bx-right-arrow-alt'></i></button></td>
          </tr>`;
      }).join('');
    } catch (err) {
      console.error(err);
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--danger);"><i class="bx bx-error"></i> Lỗi khi tải kết quả. Vui lòng thử lại.</td></tr>';
    }
  }

  async function viewDetails(resultId) {
    document.getElementById('detailModal').style.display = 'flex';
    document.getElementById('modalBody').innerHTML = '<div class="flex justify-center"><i class="bx bx-loader-alt bx-spin text-3xl text-primary"></i></div>';
    document.getElementById('modalTitle').innerText = 'Chi tiết bài thi';

    try {
      const data = await apiFetch('/results/' + resultId);

      if (!data.success) {
        document.getElementById('modalBody').innerHTML = `<p style="text-align:center; color:var(--danger);"><i class='bx bx-error'></i> Lỗi từ máy chủ: ${data.message}</p>`;
        return;
      }

      const { score, total, answers, quizId } = data.data || {};
      if (!quizId) {
        document.getElementById('modalBody').innerHTML = '<p style="text-align:center; color:var(--danger);"><i class="bx bx-error"></i> Bài kiểm tra gốc đã bị xoá khỏi hệ thống.</p>';
        return;
      }

      const questions = quizId.questions || [];
      
      const percentage = Math.round((score / 10) * 100);
      const conicBg = `conic-gradient(var(--success) ${percentage}%, var(--danger) 0)`;

      document.getElementById('modalTitle').innerHTML = `
        <div style="display: flex; align-items: center; gap: 24px;">
          <div style="width: 80px; height: 80px; border-radius: 50%; background: ${conicBg}; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div style="width: 64px; height: 64px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column;">
              <span style="font-size: 20px; font-weight: 800; color: var(--text-main); line-height: 1;">${score}</span>
              <span style="font-size: 11px; color: var(--text-muted); font-weight: 600;">/ 10</span>
            </div>
          </div>
          <div>
            <div style="font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Báo cáo phân tích (${total} câu)</div>
            <div style="font-size: 22px; color: var(--primary); line-height: 1.2;">${escapeHTML(quizId.title)}</div>
          </div>
        </div>
      `;

      if (questions.length === 0) {
        document.getElementById('modalBody').innerHTML = '<p class="text-center text-muted"><i class="bx bx-info-circle"></i> Không tìm thấy dữ liệu câu hỏi.</p>';
        return;
      }

      const safeAnswers = answers || [];
      let html = '';

      questions.forEach((q, idx) => {
        const studentAns = safeAnswers.find(a => a.questionId && q._id && a.questionId.toString() === q._id.toString());
        const selected = studentAns ? studentAns.selected : null;
        const isCorrect = studentAns ? studentAns.isCorrect : false;

        const cardClass = isCorrect ? 'correct-q' : 'wrong-q';
        let icon = isCorrect ? "<i class='bx bxs-check-circle text-success text-xl'></i>" : "<i class='bx bxs-x-circle text-danger text-xl'></i>";
        if (!selected) icon = "<i class='bx bxs-info-circle text-warning text-xl'></i>";

        const correctAns = q.correct ? q.correct.toUpperCase() : '';
        const selectedAns = selected ? selected.toUpperCase() : 'Chưa chọn';

        let detailText = isCorrect ? `<span class="text-success font-bold">Đúng (Bạn chọn ${selectedAns})</span>` : `<span class="text-danger font-bold">Sai (Bạn chọn ${selectedAns}, Đáp án đúng: ${correctAns})</span>`;
        if(!selected) detailText = `<span class="text-warning font-bold">Chưa chọn (Đáp án đúng: ${correctAns})</span>`;

        html += `<div class="detail-card ${cardClass}" style="padding: 16px;">
                   <div class="q-title flex items-center m-0" style="gap:8px; margin-bottom: 0;">${icon} <span>Câu ${idx + 1}: ${detailText}</span></div>
                 </div>`;
      });

      document.getElementById('modalBody').innerHTML = html;

    } catch (err) {
      console.error(err);
      document.getElementById('modalBody').innerHTML = `<p style="text-align:center; color:var(--danger);"><i class='bx bx-error'></i> Lỗi: ${err.message || "Lỗi không xác định"}.</p>`;
    }
  }

  function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

  fetchMyResults();
</script>
</body>
</html>
