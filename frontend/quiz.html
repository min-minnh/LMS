<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraLMS - Làm Bài Kiểm Tra</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
  <style>
    /* Specific overrides for Quiz - White Minimal Gen Z */
    body { background-color: #f8fafc; }
    
    .timer-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f1f5f9;
    }

    .timer-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e11d48;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .quiz-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.01em;
    }

    #quiz-active-area {
      height: calc(100vh - 40px); /* Adjusted for padding */
      animation: fadeInUp 0.5s ease-out both;
    }

    /* Result Screen overlay */
    .result-screen {
      display: none;
      text-align: center;
      max-width: 600px;
      margin: 40px auto;
      background: #ffffff;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      border: 1px solid #f1f5f9;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .score-text {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #16a34a, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 24px 0;
    }

    #loading-msg {
      text-align: center;
      font-size: 1.125rem;
      color: #6b7280;
      margin-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    
    .loading-spinner {
      font-size: 48px;
      color: #93C5FD;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Scantron specific */
    .ans-circle {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      font-weight: 700;
      color: #6b7280;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: white;
      cursor: pointer;
    }
    .ans-label-scantron input:checked + .ans-circle {
      background: #eff6ff;
      border-color: #93C5FD;
      color: #93C5FD;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(147, 197, 253, 0.2);
    }
    .ans-label-scantron:hover .ans-circle {
      border-color: #93C5FD;
      background: #f8fafc;
    }

    .doc-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.02);
      overflow: hidden;
      border: 1px solid #f1f5f9;
    }

    .exam-nav {
      width: 360px;
      flex-shrink: 0;
      background: #ffffff;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.02);
      border: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
    }

    .question-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 16px;
      transition: background 0.2s;
    }

    .question-row:hover {
      background: #f8fafc;
    }

    .question-number {
      font-weight: 800;
      color: #111827;
      width: 70px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar Slim -->
  <aside class="sidebar-slim" id="main-sidebar">
    <img src="assets/images/male_student.png" alt="Avatar" class="char-avatar" id="sidebar-avatar" onerror="this.style.display='none'">
    <a href="#" class="nav-icon" onclick="go('student-dashboard')" title="Dashboard"><i class='bx bxs-home'></i></a>
    <a href="#" class="nav-icon" onclick="go('vocab')" title="Vocabulary"><i class='bx bx-book-bookmark'></i></a>
    <a href="#" class="nav-icon" onclick="go('lesson')" title="Theory"><i class='bx bx-play-circle'></i></a>
    <a href="#" class="nav-icon active" onclick="go('quizzes-student')" title="Quizzes"><i class='bx bx-edit'></i></a>
    <a href="#" class="nav-icon" onclick="go('my-results')" title="My Results"><i class='bx bx-bar-chart-alt-2'></i></a>
    <div class="sidebar-bottom">
      <a href="#" id="admin-link" class="nav-icon" style="display:none;" onclick="go('dashboard')" title="Admin"><i class='bx bx-cog'></i></a>
      <a href="#" class="nav-icon" onclick="logout()" title="Logout" style="color:#f43f5e;"><i class='bx bx-power-off'></i></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-area" id="main-area">
    <!-- Header for Loading/Result Screens -->
    <div id="standard-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
      <div>
        <h1 style="font-size:1.5rem; font-weight:800; margin:0; color:#0f172a; display:flex; align-items:center; gap:8px;">
          <i class='bx bx-edit' style="color:#0ea5e9;"></i> <span id="header-title">Quizzes</span>
        </h1>
        <p style="color:#64748b; margin:4px 0 0; font-size:0.9rem;">Hệ thống đang chuẩn bị bài thi cho bạn.</p>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <button style="background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.2s; font-size: 20px;"><i class='bx bx-bell'></i></button>
        <div style="display: flex; align-items: center; gap: 12px; background: white; padding: 6px 16px 6px 6px; border-radius: 30px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s;">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;" id="user-avatar">S</div>
          <span style="font-weight: 600; color: #0f172a; font-size: 0.9rem;" id="user-name-top">Student</span>
        </div>
      </div>
    </div>

    <div id="loading-msg">
      <i class='bx bx-loader-alt loading-spinner'></i>
      <p class="font-semibold text-lg">Đang tải bài kiểm tra...</p>
    </div>

    <!-- Quiz Active Area -->
    <div id="quiz-active-area" style="display: none; gap: 24px; position: fixed; top: 20px; left: 20px; right: 20px; bottom: 20px; z-index: 1000;">
      
      <!-- Left: Document Viewer -->
      <div class="doc-pane">
        <div class="timer-bar">
          <div class="quiz-title"><i class='bx bx-edit text-[#93C5FD]'></i> <span id="quiz-title-text">Bài Kiểm Tra</span></div>
          <div id="audio-container" style="display:none; flex: 1; margin: 0 40px;">
            <!-- Audio elements inject here -->
          </div>
          <div class="timer-text" id="timer-text"><i class='bx bx-timer'></i> 00:00</div>
        </div>
        <iframe id="docViewer" style="flex:1; width:100%; border:none; background: #525659;"></iframe>
      </div>

      <!-- Right: Answers Sheet -->
      <div class="exam-nav">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 class="font-extrabold text-sm text-[#9ca3af] uppercase tracking-wider m-0">Phiếu Trả Lời</h3>
          <span class="px-3 py-1 bg-[#eff6ff] text-[#93C5FD] rounded-full text-xs font-bold border border-[#bfdbfe]" id="question-count-badge">0 Câu hỏi</span>
        </div>
        
        <div id="questions-container" style="flex: 1; overflow-y: auto; padding-right: 8px;">
          <!-- Questions inject here -->
        </div>
        
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
          <button class="w-full text-white font-bold rounded-2xl flex items-center justify-center gap-2 transition-all" id="btn-submit" onclick="submitQuiz()" style="padding: 16px; font-size: 1rem; background: linear-gradient(135deg, #93C5FD, #C4B5FD); box-shadow: 0 4px 14px rgba(147, 197, 253, 0.3);">
            <i class='bx bx-check-double'></i> Nộp bài thi ngay
          </button>
        </div>
      </div>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="result-box">
      <div style="width: 80px; height: 80px; background: #fef3c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <i class='bx bxs-trophy text-[#d97706]' style="font-size: 40px;"></i>
      </div>
      <h2 id="result-title" style="font-weight: 800; margin-bottom: 8px; color: #111827;">Hoàn thành bài kiểm tra!</h2>
      <p class="text-[#6b7280]">Chúc mừng bạn đã hoàn thành thử thách này.</p>
      
      <div class="score-text" id="score-text">0 / 0</div>
      
      <div style="background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 32px; border: 1px solid #f1f5f9;">
        <p class="text-[#6b7280] m-0" id="result-msg">Kết quả của bạn đã được hệ thống lưu lại an toàn.</p>
      </div>
      
      <div style="display: grid; gap: 12px;">
        <button class="w-full text-white font-bold rounded-2xl flex items-center justify-center gap-2 transition-all" onclick="window.location.href='my-results.html'" style="padding: 16px; font-size: 1rem; background: linear-gradient(135deg, #93C5FD, #C4B5FD); box-shadow: 0 4px 14px rgba(147, 197, 253, 0.3);">
          <i class='bx bx-bar-chart-alt-2'></i> Xem bảng điểm chi tiết
        </button>
        <button class="w-full bg-[#f8fafc] text-[#111827] border border-[#e5e7eb] font-bold rounded-2xl flex items-center justify-center gap-2 transition-all hover:bg-[#f1f5f9]" onclick="window.location.href='quizzes-student.html'" style="padding: 16px; font-size: 1rem;">
          <i class='bx bx-arrow-back'></i> Quay về danh sách bài tập
        </button>
      </div>
    </div>
  </main>
</div>

<script>
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "index.html";
  const params = new URLSearchParams(window.location.search);
  const quizId = params.get("id");
  if (!quizId) window.location.href = "quizzes-student.html";

  const userStr = localStorage.getItem("user");
  const user = userStr ? JSON.parse(userStr) : null;
  
  if (user) {
    if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";
    
    const displayName = user.name || (user.email ? user.email.split('@')[0] : 'Student');
    document.getElementById('user-name-top').innerText = displayName;
    document.getElementById('user-avatar').innerText = displayName.charAt(0).toUpperCase();

    // Set gender avatar
    function getGenderImg(g) {
      const v = (g || 'male').toLowerCase();
      return (v === 'female' || v === 'girl') ? 'assets/images/female_student.png' : 'assets/images/male_student.png';
    }
    const sidebarAvatar = document.getElementById('sidebar-avatar');
    if (sidebarAvatar) { 
      sidebarAvatar.src = getGenderImg(user.gender); 
      sidebarAvatar.onerror = () => sidebarAvatar.style.display='none'; 
    }
  }

  function go(page) { window.location.href = page + ".html"; }
  function logout() { localStorage.clear(); window.location.href = "index.html"; }

  let resultId = null;
  let questions = [];
  let timeLeft = 60;
  let timerInterval;
  let cheatCount = 0;
  let isQuizActive = false;

  // Anti-Cheat Mechanics
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('copy', e => {
    e.preventDefault();
    alert('⚠️ Cảnh báo: Học viên không được sao chép văn bản trong lúc làm bài!');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
      e.preventDefault();
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isQuizActive && timeLeft > 0) {
      cheatCount++;
      alert(`⚠️ HỆ THỐNG CHỐNG GIAN LẬN:\nBạn vừa thoát khỏi ranh giới màn hình bài thi hoặc chuyển sang Tab khác.\nHành vi này đã được ghi nhận. Số lần vi phạm: ${cheatCount}`);

      if (cheatCount >= 3) {
        alert('⛔ CẢNH BÁO: Vì bạn đã vi phạm rời màn hình 3 lần, hệ thống sẽ khoá và tự động nộp bài thi của bạn ngay bây giờ!');
        submitQuiz();
      }
    }
  });

  async function startQuiz() {
    try {
      const res = await fetch('https://lms-gzty.onrender.com/results/quiz/' + quizId + '/start', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
      });
      const data = await res.json();

      if (!data.success) {
        document.getElementById('loading-msg').innerHTML = `<i class='bx bx-error-circle text-danger' style="font-size:48px;"></i><p>${data.message || "Không thể tải bài kiểm tra."}</p>`;
        return;
      }

      resultId = data.data.resultId;
      const quiz = data.data.quiz;
      
      // Fetch full quiz to ensure we get audioFile2
      try {
        const fullRes = await fetch('https://lms-gzty.onrender.com/quizzes/' + quizId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const fullData = await fullRes.json();
        if (fullData.success && fullData.data && fullData.data.audioFile2) {
          quiz.audioFile2 = fullData.data.audioFile2;
        }
      } catch (e) { console.warn("Audio2 fetch fallback failed", e); }

      questions = quiz.questions || [];

      if (questions.length === 0) {
        document.getElementById('loading-msg').innerHTML = `<i class='bx bx-info-circle text-warning' style="font-size:48px;"></i><p>Bài kiểm tra này chưa có câu hỏi nào.</p>`;
        return;
      }

      // FOCUS MODE: Hide sidebar and normal header
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('standard-header').style.display = 'none';
      document.getElementById('main-sidebar').style.display = 'none';
      document.getElementById('main-area').style.padding = '0';
      document.body.style.background = '#f1f5f9';
      
      document.getElementById('quiz-active-area').style.display = 'flex';
      document.getElementById('quiz-title-text').innerText = quiz.title || 'Làm bài kiểm tra';
      document.getElementById('question-count-badge').innerText = `${questions.length} Câu hỏi`;

      const audioContainer = document.getElementById('audio-container');
      audioContainer.innerHTML = '';
      let hasAudio = false;

      if (quiz.audioFile1) {
        hasAudio = true;
        const safePath = quiz.audioFile1.replace(/\\/g, '/');
        audioContainer.innerHTML += `<audio controls style="height: 32px; width: 100%; margin-bottom: 4px;" src="https://lms-gzty.onrender.com${safePath}"></audio>`;
      }
      if (quiz.audioFile2) {
        hasAudio = true;
        const safePath = quiz.audioFile2.replace(/\\/g, '/');
        audioContainer.innerHTML += `<audio controls style="height: 32px; width: 100%;" src="https://lms-gzty.onrender.com${safePath}"></audio>`;
      }
      if (hasAudio) audioContainer.style.display = 'block';
      
      if (quiz.originalFiles && quiz.originalFiles.length > 0) {
        const rawPath = quiz.originalFiles[0].replace(/\\/g, '/');
        const fileUrl = 'https://lms-gzty.onrender.com' + rawPath;
        if (rawPath.startsWith('/files/')) {
          document.getElementById('docViewer').src = `https://docs.google.com/gview?url=${encodeURIComponent(fileUrl)}&embedded=true`;
        } else if (fileUrl.toLowerCase().endsWith('.pdf')) {
          document.getElementById('docViewer').src = fileUrl;
        } else {
          document.getElementById('docViewer').src = `https://docs.google.com/gview?url=${encodeURIComponent(fileUrl)}&embedded=true`;
        }
      } else {
        document.getElementById('docViewer').srcdoc = `<div style="padding:40px; text-align:center; color:gray; font-family:sans-serif;">Không tìm thấy file đề bài.</div>`;
      }

      timeLeft = quiz.timeLimit || (questions.length * 60);
      isQuizActive = true;
      startTimer();
      renderQuestions();
    } catch (err) {
      console.error(err);
      document.getElementById('loading-msg').innerHTML = `<i class='bx bx-wifi-off text-danger' style="font-size:48px;"></i><p>Lỗi kết nối mạng.</p>`;
    }
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      document.getElementById('timer-text').innerHTML = `<i class='bx bx-timer'></i> ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

      if (timeLeft <= 60 && timeLeft > 0) {
        document.getElementById('timer-text').style.color = 'var(--danger)';
        document.getElementById('timer-text').style.transform = timeLeft % 2 === 0 ? 'scale(1.1)' : 'scale(1)';
      }

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        submitQuiz(); 
      }
    }, 1000);
  }

  function renderQuestions() {
    const container = document.getElementById('questions-container');
    container.innerHTML = questions.map((q, idx) => `
      <div class="question-row" id="q-${idx}">
        <div class="question-number">Câu ${idx + 1}</div>
        <div style="display: flex; gap: 8px; flex: 1; justify-content: space-between;">
          ${['A', 'B', 'C', 'D'].map(opt => `
            <label class="ans-label-scantron">
              <input type="radio" name="${q._id}" value="${opt}" style="display:none;" />
              <div class="ans-circle">${opt}</div>
            </label>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  async function submitQuiz() {
    if (timeLeft > 0 && cheatCount < 3) {
      if (!confirm("Bạn có chắc chắn muốn nộp bài? Hãy kiểm tra kỹ các câu trả lời!")) return;
    }

    isQuizActive = false;
    clearInterval(timerInterval);
    document.getElementById('btn-submit').innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Đang nộp bài...";
    document.getElementById('btn-submit').disabled = true;

    let clientAnswers = [];
    questions.forEach(q => {
      const selectedRadio = document.querySelector(`input[name="${q._id}"]:checked`);
      if (selectedRadio) clientAnswers.push({ questionId: q._id, selected: selectedRadio.value });
    });

    // RESTORE UI
    document.getElementById('quiz-active-area').style.display = 'none';
    document.getElementById('main-sidebar').style.display = 'flex';
    document.getElementById('main-area').style.padding = '32px 40px';
    document.getElementById('standard-header').style.display = 'flex';
    document.getElementById('header-title').innerText = "Kết Quả Bài Thi";
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('score-text').innerHTML = "<i class='bx bx-loader-alt bx-spin'></i>";

    try {
      const res = await fetch(`https://lms-gzty.onrender.com/results/quiz/${quizId}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ resultId, clientAnswers })
      });

      const data = await res.json();
      if (data.success) {
        document.getElementById('score-text').innerText = `${data.data.score} / ${data.data.total}`;
        if (data.data.score === data.data.total) document.getElementById('result-title').innerText = "Điểm 10 tuyệt đối! 🏆";
      } else {
        document.getElementById('score-text').innerText = "Lỗi";
        document.getElementById('result-msg').innerText = data.message;
      }
    } catch (err) {
      console.error(err);
      document.getElementById('score-text').innerText = "Lỗi Mạng";
    }
  }

  startQuiz();


// Global Dropdown Handler for Student Topbar
document.addEventListener('click', function(e) {
  // Profile Dropdown
  const profileEl = document.getElementById('user-name-top')?.parentElement;
  if (profileEl && profileEl.contains(e.target)) {
    let drop = document.getElementById('student-dropdown');
    if (!drop) {
      drop = document.createElement('div');
      drop.id = 'student-dropdown';
      const rect = profileEl.getBoundingClientRect();
      drop.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 8px 0;
        z-index: 9999;
        min-width: 180px;
        animation: slideDown 0.2s ease-out;
      `;
      drop.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; margin-bottom: 4px;">
          <div style="font-weight: 700; color: #0f172a;" id="drop-name"></div>
          <div style="font-size: 0.8rem; color: #64748b;">Student Account</div>
        </div>
        <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #ef4444; text-decoration: none; transition: background 0.2s; font-weight: 600;">
          <i class='bx bx-log-out'></i> Log out
        </a>
      `;
      document.body.appendChild(drop);
      document.getElementById('drop-name').innerText = document.getElementById('user-name-top').innerText;
      
      const animStyle = document.createElement('style');
      animStyle.innerHTML = "@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } } #student-dropdown a:hover { background: #fef2f2; }";
      document.head.appendChild(animStyle);
    } else {
      drop.style.display = drop.style.display === 'none' ? 'block' : 'none';
      if(drop.style.display === 'block') {
        const rect = profileEl.getBoundingClientRect();
        drop.style.top = `${rect.bottom + 10}px`;
        drop.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const drop = document.getElementById('student-dropdown');
    if (drop && !e.target.closest('#student-dropdown')) {
      drop.style.display = 'none';
    }
  }
  
  // Notification Bell
  const bellBtn = e.target.closest('button');
  if (bellBtn && bellBtn.querySelector('.bx-bell')) {
    let notif = document.getElementById('student-notif');
    if (!notif) {
      notif = document.createElement('div');
      notif.id = 'student-notif';
      const rect = bellBtn.getBoundingClientRect();
      notif.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 0;
        z-index: 9999;
        min-width: 280px;
        animation: slideDown 0.2s ease-out;
      `;
      notif.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 700; color: #0f172a;">
          Notifications
        </div>
        <div style="padding: 20px 16px; text-align: center; color: #64748b; font-size: 0.9rem;">
          <i class='bx bx-bell-off' style="font-size: 24px; color: #cbd5e1; margin-bottom: 8px; display: block;"></i>
          No new notifications
        </div>
      `;
      document.body.appendChild(notif);
    } else {
      notif.style.display = notif.style.display === 'none' ? 'block' : 'none';
      if(notif.style.display === 'block') {
        const rect = bellBtn.getBoundingClientRect();
        notif.style.top = `${rect.bottom + 10}px`;
        notif.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const notif = document.getElementById('student-notif');
    if (notif && !e.target.closest('#student-notif')) {
      notif.style.display = 'none';
    }
  }
});

</script>
</body>
</html>
