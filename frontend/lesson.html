<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AstraLMS - Lessons</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5c9eff;
      --primary-hover: #4b89ea;
      --sidebar-bg: #82b3f4;
      --bg: #f4f8fc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --text-sidebar: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
    }

    /* Unified Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
    }

    .sidebar .logo {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 40px;
      color: var(--text-sidebar);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .sidebar .logo span {
      font-size: 24px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 5px 0;
      padding: 12px 18px;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s ease;
      font-size: 15px;
      font-weight: 500;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .sidebar a.active {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-weight: 600;
    }

    #admin-link {
      display: none;
      margin-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 20px;
      border-radius: 0;
    }

    /* Main Area */
    .main {
      flex: 1;
      padding: 40px 60px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .header {
      width: 100%;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
    }

    /* Topic Grid */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
    }

    .topic-card {
      background: var(--surface);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
    }

    .topic-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(92, 158, 255, 0.15);
      border-color: var(--primary);
    }

    .topic-icon {
      font-size: 40px;
      margin-bottom: 15px;
      display: inline-block;
    }

    .topic-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    .empty-state-card {
      background: var(--surface);
      padding: 50px;
      border-radius: 16px;
      text-align: center;
      color: var(--text-muted);
      width: 100%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
      font-size: 15px;
      grid-column: 1/-1;
    }

    /* View 2 Header */
    .view-header {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      margin-bottom: 30px;
    }

    .back-btn {
      background: var(--surface);
      color: var(--text-main);
      border: 1px solid #e2e8f0;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }

    .back-btn:hover {
      background: #f1f5f9;
    }

    .topic-title-large {
      font-size: 26px;
      font-weight: 700;
      color: #1e3a8a;
    }

    /* Lessons Grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      width: 100%;
    }

    .lesson-card {
      background: var(--surface);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(92, 158, 255, 0.15);
      border-color: var(--primary);
    }

    .lesson-img {
      height: 180px;
      background: #e2e8f0;
      width: 100%;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid #e2e8f0;
    }

    .lesson-info {
      padding: 24px;
      flex: 1;
    }

    .lesson-info h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .lesson-info p {
      font-size: 14px;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo"><span>🎓</span> Student</div>
    <a onclick="go('student-dashboard')">🏠 Dashboard</a>
    <a onclick="go('vocab')">📚 Vocabulary</a>
    <a onclick="go('lesson')" class="active">📖 Theory</a>
    <a onclick="go('quizzes-student')">📝 Quizzes</a>
    <a onclick="go('my-results')">📊 My Results</a>
    <div style="flex-grow: 1;"></div>
    <a id="admin-link" onclick="go('dashboard')">⚙️ Admin Control Panel</a>
    <a onclick="logout()">🚪 Logout</a>
  </div>

  <div class="main">
    <!-- VIEW 1: TOPICS -->
    <div id="topicsView" style="width: 100%; display: flex; flex-direction: column; align-items: flex-start;">
      <div class="header">
        <h1>📖 Theory Categories</h1>
        <p>Select a category to view the available lessons and materials.</p>
      </div>

      <div class="topic-grid" id="topicGrid">
        <div class="empty-state-card">Loading folders...</div>
      </div>
    </div>

    <!-- VIEW 2: INSIDE TOPIC -->
    <div id="lessonsView" style="display: none; width: 100%; flex-direction: column; align-items: flex-start;">
      <div class="view-header">
        <button class="back-btn" onclick="backToTopics()">⬅ Danh mục</button>
        <div class="topic-title-large" id="topicTitle">Folder Name</div>
      </div>

      <div class="cards" id="lesson-container"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const userStr = localStorage.getItem("user");
    if (!token || !userStr) window.location.href = "index.html";

    const user = JSON.parse(userStr);
    if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    function go(page) { window.location.href = page + ".html"; }

    async function loadTopics() {
      try {
        const res = await fetch('https://lms-gzty.onrender.com/topics?type=lesson&limit=50', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const grid = document.getElementById('topicGrid');

        if (!data.success || data.data.topics.length === 0) {
          grid.innerHTML = '<div class="empty-state-card"><span class="topic-icon">📗</span><br>No lesson folders available.</div>';
          return;
        }

        grid.innerHTML = data.data.topics.map(t => `
      <div class="topic-card" onclick="openTopic('${t._id}', '${t.name.replace(/'/g, "\\'")}')">
        <span class="topic-icon">📗</span>
        <div class="topic-title">${t.name}</div>
      </div>
    `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function openTopic(id, name) {
      document.getElementById('topicsView').style.display = 'none';
      document.getElementById('lessonsView').style.display = 'flex';
      document.getElementById('topicTitle').innerText = name;

      const container = document.getElementById('lesson-container');
      container.innerHTML = '<div class="empty-state-card">Loading lessons...</div>';

      try {
        const res = await fetch('https://lms-gzty.onrender.com/lessons?topicId=' + id + '&limit=100', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const lessons = data.data?.lessons || [];

        if (lessons.length === 0) {
          container.innerHTML = '<div class="empty-state-card">No lessons found in this folder.</div>';
          container.style.display = "block";
          return;
        }

        container.style.display = "grid";
        container.innerHTML = '';
        lessons.forEach(l => {
          const img = l.imageUrl ? 'https://lms-gzty.onrender.com' + l.imageUrl : 'https://images.unsplash.com/photo-1513258496099-48168024aec0?auto=format&fit=crop&w=600&q=80';
          const card = document.createElement('div');
          card.className = 'lesson-card';
          card.onclick = () => window.location.href = `lesson-detail.html?id=${l._id}`;
          card.innerHTML = `
        <div class="lesson-img" style="background-image: url('${img}')"></div>
        <div class="lesson-info">
          <h3>${l.title}</h3>
          <p>${l.content}</p>
        </div>
      `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
      }
    }

    function backToTopics() {
      document.getElementById('topicsView').style.display = 'flex';
      document.getElementById('lessonsView').style.display = 'none';
    }

    loadTopics();
  </script>

</body>

</html>
