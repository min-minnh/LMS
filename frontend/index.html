<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>LMS - Login & Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #0f172a;
    }

    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 700;
    }

    h2 {
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 24px;
      color: #1e293b;
    }

    p.subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      color: #1e293b;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    button.primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }

    .toggle-text {
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    .toggle-text span {
      color: #6366f1;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .toggle-text span:hover {
      color: #4f46e5;
      text-decoration: underline;
    }

    #register-fields {
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">A</div>
    <h2 id="form-title">Welcome Back</h2>
    <p class="subtitle" id="form-subtitle">Log in to continue your learning journey.</p>

    <div id="register-fields">
      <div class="input-group">
        <label>Full Name</label>
        <input id="name" placeholder="John Doe">
      </div>
    </div>

    <div class="input-group">
      <label>Email or Username</label>
      <input id="email" type="text" placeholder="minmin">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <button class="primary" id="submit-btn" onclick="submitForm()">Log In</button>

    <p class="toggle-text" id="toggle-desc">
      New student? <span onclick="toggleMode()">Create an account</span>
    </p>
  </div>

  <script>
    let isLoginMode = true;

    function toggleMode() {
      isLoginMode = !isLoginMode;
      const title = document.getElementById('form-title');
      const subtitle = document.getElementById('form-subtitle');
      const btn = document.getElementById('submit-btn');
      const toggleDesc = document.getElementById('toggle-desc');
      const regFields = document.getElementById('register-fields');
      const emailLabel = document.querySelector('#email').previousElementSibling;

      if (isLoginMode) {
        title.innerText = "Welcome Back";
        subtitle.innerText = "Log in to continue your learning journey.";
        btn.innerText = "Log In";
        toggleDesc.innerHTML = `New student? <span onclick="toggleMode()">Create an account</span>`;
        regFields.style.display = "none";
        emailLabel.innerText = "Email or Username";
        document.getElementById('email').placeholder = "minmin";
      } else {
        title.innerText = "Join Us";
        subtitle.innerText = "Start learning today.";
        btn.innerText = "Register";
        toggleDesc.innerHTML = `Already have an account? <span onclick="toggleMode()">Log In</span>`;
        regFields.style.display = "block";
        emailLabel.innerText = "Email Address";
        document.getElementById('email').placeholder = "john@example.com";
      }
    }

    async function submitForm() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) return alert("Please fill all fields!");

      const url = isLoginMode ? 'https://lms-gzty.onrender.com/auth/login' : 'https://lms-gzty.onrender.com/auth/register';
      const bodyData = { email, password };

      if (!isLoginMode) {
        const name = document.getElementById('name').value;
        if (!name) return alert("Please fill your name!");
        bodyData.name = name;
      }

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });

        const data = await res.json();

        if (data.success && data.data && data.data.token) {
          localStorage.setItem("token", data.data.token);
          localStorage.setItem("user", JSON.stringify(data.data.user));

          // If student, you might redirect to a student portal. But the req is about admin:
          if (data.data.user.role === 'admin') {
            window.location.href = "dashboard.html";
          } else {
            window.location.href = "student-dashboard.html";
          }
        } else if (data.success && !isLoginMode) {
          alert("Registration successful! Please login.");
          toggleMode();
        } else {
          alert(data.message || 'Login failed');
        }
      } catch (err) {
        console.error(err);
        alert("Error connecting to server.");
      }
    }
  </script>

</body>

</html>
