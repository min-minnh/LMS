<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraLMS - Quizzes List</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
    /* Specific overrides for Quizzes List - Enhanced Contrast */
    body { background-color: #f8fafc; color: #111827; }
    
    .topic-icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: inline-block;
      color: #3b82f6; /* stronger blue */
      background: #eff6ff;
      padding: 16px;
      border-radius: 20px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .empty-state-card {
      background: #ffffff;
      padding: 64px 40px;
      border-radius: 24px;
      text-align: center;
      color: #64748b;
      width: 100%;
      border: 2px dashed #cbd5e1; /* clearer dashed border */
      grid-column: 1/-1;
      font-weight: 600;
    }
    
    .quiz-card {
      background: #ffffff;
      border: 1px solid #e2e8f0; /* clearer border */
      border-radius: 24px;
      padding: 32px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); /* stronger shadow */
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
    }
    .quiz-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
      border-color: #cbd5e1;
    }
    
    .quiz-card-cta {
      margin-top: 24px;
      padding: 14px;
      background: #eff6ff; /* pastel blue background */
      color: #3b82f6; /* solid blue text */
      border-radius: 16px;
      font-weight: 700;
      text-align: center;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .quiz-card:hover .quiz-card-cta {
      background: #3b82f6;
      color: white;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      align-items: center;
    }
    .search-input {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      padding: 14px 24px;
      border-radius: 100px;
      font-size: 0.9375rem;
      flex: 1;
      max-width: 320px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      outline: none;
    }
    .search-input:focus {
      border-color: #93C5FD;
      box-shadow: 0 0 0 4px #eff6ff;
    }
    .filter-chip {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #6b7280;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-chip:hover {
      background: #f8fafc;
      color: #111827;
    }
    .filter-chip.active {
      background: #eff6ff;
      color: #93C5FD;
      border-color: #eff6ff;
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar-slim">
    <img src="assets/images/female_student.png" alt="Avatar" class="char-avatar" id="sidebar-avatar" onerror="this.style.display='none'">
    <a href="#" class="nav-icon" onclick="go('student-dashboard')" title="Dashboard"><i class='bx bxs-home'></i></a>
    <a href="#" class="nav-icon" onclick="go('vocab')" title="Vocabulary"><i class='bx bx-book-bookmark'></i></a>
    <a href="#" class="nav-icon" onclick="go('lesson')" title="Theory"><i class='bx bx-play-circle'></i></a>
    <a href="#" class="nav-icon active" onclick="go('quizzes-student')" title="Quizzes"><i class='bx bx-edit'></i></a>
    <a href="#" class="nav-icon" onclick="go('my-results')" title="My Results"><i class='bx bx-bar-chart-alt-2'></i></a>
    <div class="sidebar-bottom">
      <a href="#" id="admin-link" class="nav-icon" style="display:none;" onclick="go('dashboard')" title="Admin"><i class='bx bx-cog'></i></a>
      <a href="#" class="nav-icon" onclick="logout()" title="Logout" style="color:#f43f5e;"><i class='bx bx-power-off'></i></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-area" style="background: #f8fafc;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
      <div>
        <h1 style="font-size:1.5rem; font-weight:800; margin:0; color:#0f172a; display:flex; align-items:center; gap:8px;">
          <i class='bx bx-edit' style="color:#0ea5e9;"></i> All Quizzes
        </h1>
        <p style="color:#64748b; margin:4px 0 0; font-size:0.9rem;">Select a quiz to test your knowledge.</p>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <button style="background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.2s; font-size: 20px;"><i class='bx bx-bell'></i></button>
        <div style="display: flex; align-items: center; gap: 12px; background: white; padding: 6px 16px 6px 6px; border-radius: 30px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s;">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;" id="user-avatar">S</div>
          <span style="font-weight: 600; color: #0f172a; font-size: 0.9rem;" id="user-name-top">Student</span>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" class="search-input" placeholder="Search quizzes...">
      <div style="display: flex; gap: 8px;">
        <div class="filter-chip active" style="background: #3b82f6; color: white; border-color: #3b82f6;">All</div>
        <div class="filter-chip">In Progress</div>
        <div class="filter-chip">Completed</div>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6" id="quizGrid">
      <div class="empty-state-card">Loading quizzes...</div>
    </div>
  </main>
</div>

<script>
const token = localStorage.getItem("token");
const userStr = localStorage.getItem("user");
if (!token || !userStr) window.location.href = "index.html";

const user = JSON.parse(userStr);
if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

const displayName = user.name || (user.email ? user.email.split('@')[0] : 'Student');
document.getElementById('user-name-top').innerText = displayName;
document.getElementById('user-avatar').innerText = displayName.charAt(0).toUpperCase();

// Set gender avatar — from user.gender, default male
function getGenderImg(g) {
  const v = (g || 'male').toLowerCase();
  return (v === 'female' || v === 'girl') ? 'assets/images/female_student.png' : 'assets/images/male_student.png';
}
const sidebarAvatar = document.getElementById('sidebar-avatar');
if (sidebarAvatar) { sidebarAvatar.src = getGenderImg(user.gender); sidebarAvatar.onerror = () => sidebarAvatar.style.display='none'; }

function logout() { localStorage.clear(); window.location.href = "index.html"; }
function go(page) { window.location.href = page + ".html"; }


async function loadQuizzes() {
  try {
    const res = await fetch('https://lms-gzty.onrender.com/quizzes?limit=100', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const grid = document.getElementById('quizGrid');
    
    if (!data.success || data.data.quizzes.length === 0) {
      grid.innerHTML = `<div class="empty-state-card"><i class='bx bx-trophy topic-icon' style="color: var(--text-light)"></i><br>No quizzes available at the moment.</div>`;
      return;
    }

    grid.innerHTML = data.data.quizzes.map(q => `
      <div class="quiz-card" onclick="window.location.href='quiz.html?id=${q._id}'">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
          <div class="w-14 h-14 rounded-2xl bg-[#eff6ff] flex items-center justify-center text-[#93C5FD]">
            <i class='bx bx-edit text-2xl'></i>
          </div>
          <span class="px-3 py-1 bg-[#dcfce7] text-[#16a34a] rounded-full text-xs font-bold border border-[#bbf7d0]">Medium</span>
        </div>
        <h3 class="font-extrabold text-[#111827] text-xl mb-3 tracking-tight">${q.title}</h3>
        <div class="flex items-center gap-4 text-[#6b7280] text-sm font-medium mb-4">
          <span style="display:flex; align-items:center; gap:4px;"><i class='bx bx-time-five'></i> ${Math.ceil(q.timeLimit/60)}m</span>
          <span style="display:flex; align-items:center; gap:4px;"><i class='bx bx-list-ul'></i> ${q.questionCount || 0} Qs</span>
        </div>
        ${q.description ? `<p class="text-sm text-[#9ca3af] line-clamp-2 m-0 flex-1">${q.description}</p>` : '<div class="flex-1"></div>'}
        <div class="quiz-card-cta">Bắt đầu làm bài ✨</div>
      </div>
    `).join('');
  } catch(err) {
    console.error(err);
  }
}

loadQuizzes();


// Global Dropdown Handler for Student Topbar
document.addEventListener('click', function(e) {
  // Profile Dropdown
  const profileEl = document.getElementById('user-name-top')?.parentElement;
  if (profileEl && profileEl.contains(e.target)) {
    let drop = document.getElementById('student-dropdown');
    if (!drop) {
      drop = document.createElement('div');
      drop.id = 'student-dropdown';
      const rect = profileEl.getBoundingClientRect();
      drop.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 8px 0;
        z-index: 9999;
        min-width: 180px;
        animation: slideDown 0.2s ease-out;
      `;
      drop.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; margin-bottom: 4px;">
          <div style="font-weight: 700; color: #0f172a;" id="drop-name"></div>
          <div style="font-size: 0.8rem; color: #64748b;">Student Account</div>
        </div>
        <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #ef4444; text-decoration: none; transition: background 0.2s; font-weight: 600;">
          <i class='bx bx-log-out'></i> Log out
        </a>
      `;
      document.body.appendChild(drop);
      document.getElementById('drop-name').innerText = document.getElementById('user-name-top').innerText;
      
      const animStyle = document.createElement('style');
      animStyle.innerHTML = "@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } } #student-dropdown a:hover { background: #fef2f2; }";
      document.head.appendChild(animStyle);
    } else {
      drop.style.display = drop.style.display === 'none' ? 'block' : 'none';
      if(drop.style.display === 'block') {
        const rect = profileEl.getBoundingClientRect();
        drop.style.top = `${rect.bottom + 10}px`;
        drop.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const drop = document.getElementById('student-dropdown');
    if (drop && !e.target.closest('#student-dropdown')) {
      drop.style.display = 'none';
    }
  }
  
  // Notification Bell
  const bellBtn = e.target.closest('button');
  if (bellBtn && bellBtn.querySelector('.bx-bell')) {
    let notif = document.getElementById('student-notif');
    if (!notif) {
      notif = document.createElement('div');
      notif.id = 'student-notif';
      const rect = bellBtn.getBoundingClientRect();
      notif.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 0;
        z-index: 9999;
        min-width: 280px;
        animation: slideDown 0.2s ease-out;
      `;
      notif.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 700; color: #0f172a;">
          Notifications
        </div>
        <div style="padding: 20px 16px; text-align: center; color: #64748b; font-size: 0.9rem;">
          <i class='bx bx-bell-off' style="font-size: 24px; color: #cbd5e1; margin-bottom: 8px; display: block;"></i>
          No new notifications
        </div>
      `;
      document.body.appendChild(notif);
    } else {
      notif.style.display = notif.style.display === 'none' ? 'block' : 'none';
      if(notif.style.display === 'block') {
        const rect = bellBtn.getBoundingClientRect();
        notif.style.top = `${rect.bottom + 10}px`;
        notif.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const notif = document.getElementById('student-notif');
    if (notif && !e.target.closest('#student-notif')) {
      notif.style.display = 'none';
    }
  }
});

</script>
</body>
</html>
