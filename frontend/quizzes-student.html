<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AstraLMS - Quizzes List</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5c9eff;
      --primary-hover: #4b89ea;
      --sidebar-bg: #82b3f4;
      --bg: #f4f8fc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --text-sidebar: #ffffff;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body { display: flex; min-height: 100vh; background: var(--bg); color: var(--text-main); }
    
    /* Unified Sidebar */
    .sidebar { width: 260px; background: var(--sidebar-bg); padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
    .sidebar .logo { font-weight: 700; font-size: 20px; margin-bottom: 40px; color: var(--text-sidebar); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .sidebar .logo span { font-size: 24px; }
    .sidebar a { display: flex; align-items: center; gap: 14px; margin: 5px 0; padding: 12px 18px; color: rgba(255,255,255,0.9); text-decoration: none; cursor: pointer; border-radius: 10px; transition: all 0.2s ease; font-size: 15px; font-weight: 500; }
    .sidebar a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar a.active { background: rgba(255, 255, 255, 0.25); color: #fff; font-weight: 600; }
    #admin-link { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; border-radius: 0; }
    
    /* Main Area */
    .main { flex: 1; padding: 40px 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: flex-start; }
    .header { width: 100%; margin-bottom: 30px; }
    .header h1 { font-size: 28px; font-weight: 700; color: #1e3a8a; margin-bottom: 8px; }
    .header p { color: var(--text-muted); font-size: 15px; font-weight: 400; }

    /* Quizzes Grid */
    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; width: 100%; }
    .topic-card {
      background: var(--surface); border: 1px solid #e2e8f0; border-radius: 16px; padding: 30px 20px; text-align: center;
      cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }
    .topic-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(92,158,255,0.15); border-color: var(--primary); }
    .topic-icon { font-size: 40px; margin-bottom: 15px; display: inline-block; }
    .topic-title { font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 10px; }
    .topic-meta { font-size: 13px; color: var(--text-muted); background: #f1f5f9; padding: 5px 12px; border-radius: 12px; font-weight: 500;}

    /* Empty State Card */
    .empty-state-card { background: var(--surface); padding: 50px; border-radius: 16px; text-align: center; color: var(--text-muted); width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.03); font-size: 15px; grid-column: 1/-1;}

  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><span>🎓</span> Student</div>
  <a onclick="go('student-dashboard')">🏠 Dashboard</a>
  <a onclick="go('vocab')">📚 Vocabulary</a>
  <a onclick="go('lesson')">📖 Theory</a>
  <a onclick="go('quizzes-student')" class="active">📝 Quizzes</a>
  <a onclick="go('my-results')">📊 My Results</a>
  <div style="flex-grow: 1;"></div>
  <a id="admin-link" onclick="go('dashboard')">⚙️ Admin Control Panel</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="main">
  <div class="header">
    <h1>📝 All Quizzes</h1>
    <p>Select a quiz to test your knowledge.</p>
  </div>
  <div class="topic-grid" id="quizGrid">
    <div class="empty-state-card">Loading quizzes...</div>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
const userStr = localStorage.getItem("user");
if (!token || !userStr) window.location.href = "index.html";

const user = JSON.parse(userStr);
if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

function logout() { localStorage.clear(); window.location.href = "index.html"; }
function go(page) { window.location.href = page + ".html"; }

async function loadQuizzes() {
  try {
    const res = await fetch('https://lms-gzty.onrender.com/quizzes?limit=100', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const grid = document.getElementById('quizGrid');
    
    if (!data.success || data.data.quizzes.length === 0) {
      grid.innerHTML = '<div class="empty-state-card"><span class="topic-icon">🏆</span><br>No quizzes available at the moment.</div>';
      return;
    }

    grid.innerHTML = data.data.quizzes.map(q => `
      <div class="topic-card" onclick="window.location.href='quiz.html?id=${q._id}'">
        <span class="topic-icon">🏆</span>
        <div class="topic-title">${q.title}</div>
        <div class="topic-meta">⏱ ${Math.ceil(q.timeLimit/60)} phút | ❓ ${q.questionCount || 0} Questions</div>
        ${q.description ? `<p style="font-size:13px; margin-top:12px; color:var(--text-muted);">${q.description}</p>` : ''}
      </div>
    `).join('');
  } catch(err) {
    console.error(err);
  }
}

loadQuizzes();
</script>

</body>
</html>
