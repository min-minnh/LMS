<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraLMS - Quizzes List</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
    /* Specific overrides for Quizzes List */
    .empty-state-card {
      background: var(--bg-surface);
      padding: 50px;
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--text-muted);
      width: 100%;
      border: 1px dashed var(--border-color);
      grid-column: 1/-1;
    }
    
    .topic-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: inline-block;
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar-slim">
    <img src="assets/images/female_student.png" alt="Avatar" class="char-avatar" id="sidebar-avatar" onerror="this.style.display='none'">
    <a href="#" class="nav-icon" onclick="go('student-dashboard')" title="Dashboard"><i class='bx bxs-home'></i></a>
    <a href="#" class="nav-icon" onclick="go('vocab')" title="Vocabulary"><i class='bx bx-book-bookmark'></i></a>
    <a href="#" class="nav-icon" onclick="go('lesson')" title="Theory"><i class='bx bx-play-circle'></i></a>
    <a href="#" class="nav-icon active" onclick="go('quizzes-student')" title="Quizzes"><i class='bx bx-edit'></i></a>
    <a href="#" class="nav-icon" onclick="go('my-results')" title="My Results"><i class='bx bx-bar-chart-alt-2'></i></a>
    <div class="sidebar-bottom">
      <a href="#" id="admin-link" class="nav-icon" style="display:none;" onclick="go('dashboard')" title="Admin"><i class='bx bx-cog'></i></a>
      <a href="#" class="nav-icon" onclick="logout()" title="Logout" style="color:#f43f5e;"><i class='bx bx-power-off'></i></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-area">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
      <div>
        <h1 style="font-size:1.5rem; font-weight:800; margin:0; color:#0f172a; display:flex; align-items:center; gap:8px;">
          <i class='bx bx-edit' style="color:#0ea5e9;"></i> All Quizzes
        </h1>
        <p style="color:#64748b; margin:4px 0 0; font-size:0.9rem;">Select a quiz to test your knowledge.</p>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#0ea5e9,#38bdf8); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem;" id="user-avatar">S</div>
        <span style="font-weight:600; color:#0f172a;" id="user-name-top">Student</span>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6" id="quizGrid">
      <div class="empty-state-card">Loading quizzes...</div>
    </div>
  </main>
</div>

<script>
const token = localStorage.getItem("token");
const userStr = localStorage.getItem("user");
if (!token || !userStr) window.location.href = "index.html";

const user = JSON.parse(userStr);
if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

const displayName = user.name || (user.email ? user.email.split('@')[0] : 'Student');
document.getElementById('user-name-top').innerText = displayName;
document.getElementById('user-avatar').innerText = displayName.charAt(0).toUpperCase();

// Set gender avatar — from user.gender, default male
function getGenderImg(g) {
  const v = (g || 'male').toLowerCase();
  return (v === 'female' || v === 'girl') ? 'assets/images/female_student.png' : 'assets/images/male_student.png';
}
const sidebarAvatar = document.getElementById('sidebar-avatar');
if (sidebarAvatar) { sidebarAvatar.src = getGenderImg(user.gender); sidebarAvatar.onerror = () => sidebarAvatar.style.display='none'; }

function logout() { localStorage.clear(); window.location.href = "index.html"; }
function go(page) { window.location.href = page + ".html"; }


async function loadQuizzes() {
  try {
    const res = await fetch('https://lms-gzty.onrender.com/quizzes?limit=100', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const grid = document.getElementById('quizGrid');
    
    if (!data.success || data.data.quizzes.length === 0) {
      grid.innerHTML = `<div class="empty-state-card"><i class='bx bx-trophy topic-icon' style="color: var(--text-light)"></i><br>No quizzes available at the moment.</div>`;
      return;
    }

    grid.innerHTML = data.data.quizzes.map(q => `
      <div class="card text-center" style="cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; align-items: center;" onclick="window.location.href='quiz.html?id=${q._id}'" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <i class='bx bx-trophy topic-icon'></i>
        <h3 class="font-semibold text-main mb-2">${q.title}</h3>
        <div class="badge badge-primary mb-2">⏱ ${Math.ceil(q.timeLimit/60)} phút | ❓ ${q.questionCount || 0} Questions</div>
        ${q.description ? `<p class="text-sm text-muted mt-2" style="margin-bottom: 0;">${q.description}</p>` : ''}
      </div>
    `).join('');
  } catch(err) {
    console.error(err);
  }
}

loadQuizzes();
</script>
</body>
</html>
