<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AstraLMS - Lesson Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5c9eff;
      --primary-hover: #4b89ea;
      --sidebar-bg: #82b3f4;
      --bg: #f4f8fc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --text-sidebar: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
    }

    /* Unified Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
    }

    .sidebar .logo {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 40px;
      color: var(--text-sidebar);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .sidebar .logo span {
      font-size: 24px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 5px 0;
      padding: 12px 18px;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s ease;
      font-size: 15px;
      font-weight: 500;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .sidebar a.active {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-weight: 600;
    }

    #admin-link {
      display: none;
      margin-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 20px;
      border-radius: 0;
    }

    /* Main Area */
    .main {
      flex: 1;
      padding: 40px 60px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    .back-btn {
      background: var(--surface);
      color: var(--text-main);
      border: 1px solid #e2e8f0;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-size: 14px;
      margin-bottom: 24px;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #f1f5f9;
    }

    .lesson-content {
      background: var(--surface);
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
    }

    .lesson-info h1 {
      font-size: 36px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 12px;
    }

    .lesson-meta {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 30px;
      display: flex;
      gap: 16px;
    }

    .lesson-image {
      width: 100%;
      height: 350px;
      background-color: #f1f5f9;
      background-size: cover;
      background-position: center;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    .lesson-text {
      font-size: 17px;
      line-height: 1.8;
      color: #334155;
      white-space: pre-wrap;
      font-weight: 400;
    }

    .attachment-card {
      margin-top: 40px;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .download-btn {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      box-shadow: 0 4px 12px rgba(92, 158, 255, 0.3);
      transition: 0.3s;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(92, 158, 255, 0.4);
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo"><span>🎓</span> Student</div>
    <a onclick="go('student-dashboard')">🏠 Dashboard</a>
    <a onclick="go('vocab')">📚 Vocabulary</a>
    <a onclick="go('lesson')" class="active">📖 Theory</a>
    <a onclick="go('quizzes-student')">📝 Quizzes</a>
    <a onclick="go('my-results')">📊 My Results</a>
    <div style="flex-grow: 1;"></div>
    <a id="admin-link" onclick="go('dashboard')">⚙️ Admin Control Panel</a>
    <a onclick="logout()">🚪 Logout</a>
  </div>

  <div class="main">
    <div class="container">
      <a onclick="window.history.back()" class="back-btn">⬅ Trở về danh sách</a>

      <div class="lesson-content">
        <div id="image-container" class="lesson-image" style="display: none;"></div>

        <div class="lesson-info">
          <h1 id="title">Loading...</h1>
          <div class="lesson-meta">
            <span id="date"></span>
          </div>
        </div>

        <div class="lesson-text" id="content">Đang tải nội dung bài học...</div>

        <div id="attachment-container" class="attachment-card" style="display:none;">
          <div style="display:flex; align-items:center; gap: 15px;">
            <span style="font-size:28px;">📄</span>
            <div>
              <div style="font-weight:600; color:#1e3a8a; font-size: 16px;">Tài Liệu Đính Kèm</div>
              <div style="font-size:13px; color:var(--text-muted); margin-top:2px;">Tải xuống để xem ngoại tuyến</div>
            </div>
          </div>
          <a id="download-link" class="download-btn" target="_blank" download>Tải xuống</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const userStr = localStorage.getItem("user");
    if (!token || !userStr) window.location.href = "index.html";

    const user = JSON.parse(userStr);
    if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    function go(page) { window.location.href = page + ".html"; }

    async function fetchLessonDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) return window.history.back();

      try {
        const res = await fetch('https://lms-gzty.onrender.com/lessons/' + id, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!data.success) {
          document.getElementById('title').innerText = "Không tìm thấy bài học";
          document.getElementById('content').innerText = "";
          return;
        }

        const l = data.data;
        document.getElementById('title').innerText = l.title;
        document.getElementById('date').innerText = "Đăng vào ngày " + new Date(l.createdAt).toLocaleDateString();
        document.getElementById('content').innerText = l.content;

        if (l.imageUrl) {
          const imgC = document.getElementById('image-container');
          imgC.style.display = 'block';
          imgC.style.backgroundImage = `url('https://lms-gzty.onrender.com${l.imageUrl}')`;
        }

        if (l.fileUrl) {
          const attC = document.getElementById('attachment-container');
          attC.style.display = 'flex';
          document.getElementById('download-link').href = 'https://lms-gzty.onrender.com' + l.fileUrl;
        }

      } catch (err) {
        console.error(err);
        document.getElementById('title').innerText = "Lỗi tải nội dung";
        document.getElementById('content').innerText = "";
      }
    }

    fetchLessonDetail();
  </script>

</body>

</html>
