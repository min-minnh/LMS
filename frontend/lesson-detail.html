<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraLMS - Lesson Detail</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
    /* Specific overrides for Lesson Detail page */
    .lesson-detail-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .lesson-header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .lesson-image {
      width: 100%;
      height: 400px;
      background-color: var(--bg-hover);
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
      box-shadow: var(--shadow-md);
      border: 4px solid white;
    }

    .lesson-body {
      font-size: 1.125rem;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
      font-weight: 400;
    }

    .attachment-section {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px dashed var(--border-color);
    }

    .attachment-card-modern {
      background: white;
      padding: 24px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all var(--transition-bounce);
    }

    .attachment-card-modern:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    #preview-container {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .breadcrumb a {
      color: var(--text-muted);
    }

    .breadcrumb i {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar Slim -->
  <aside class="sidebar-slim">
    <img src="assets/images/male_student.png" alt="Avatar" class="char-avatar" id="sidebar-avatar" onerror="this.style.display='none'">
    <a href="#" class="nav-icon" onclick="go('student-dashboard')" title="Dashboard"><i class='bx bxs-home'></i></a>
    <a href="#" class="nav-icon" onclick="go('vocab')" title="Vocabulary"><i class='bx bx-book-bookmark'></i></a>
    <a href="#" class="nav-icon active" onclick="go('lesson')" title="Theory"><i class='bx bx-play-circle'></i></a>
    <a href="#" class="nav-icon" onclick="go('quizzes-student')" title="Quizzes"><i class='bx bx-edit'></i></a>
    <a href="#" class="nav-icon" onclick="go('my-results')" title="My Results"><i class='bx bx-bar-chart-alt-2'></i></a>
    <div class="sidebar-bottom">
      <a href="#" id="admin-link" class="nav-icon" style="display:none;" onclick="go('dashboard')" title="Admin"><i class='bx bx-cog'></i></a>
      <a href="#" class="nav-icon" onclick="logout()" title="Logout" style="color:#f43f5e;"><i class='bx bx-power-off'></i></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-area" style="background: #f8fafc;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
      <div>
        <div class="breadcrumb">
          <a href="#" onclick="go('lesson')">Theory</a>
          <i class='bx bx-chevron-right'></i>
          <span>Lesson Detail</span>
        </div>
        <h1 style="font-size:1.75rem; font-weight:800; margin:0; color:#0f172a; display:flex; align-items:center; gap:12px;">
          <i class='bx bx-play-circle' style="color:#0ea5e9;"></i> <span id="header-title">Lesson Detail</span>
        </h1>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <button style="background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.2s; font-size: 20px;"><i class='bx bx-bell'></i></button>
        <div style="display: flex; align-items: center; gap: 12px; background: white; padding: 6px 16px 6px 6px; border-radius: 30px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s;">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;" id="user-avatar">S</div>
          <span style="font-weight: 600; color: #0f172a; font-size: 0.9rem;" id="user-name-top">Student</span>
        </div>
      </div>
    </div>

    <div class="lesson-detail-container">
      <button class="btn btn-secondary mb-6" onclick="window.history.back()" style="background: white; border: 1px solid #e2e8f0; color: #64748b; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;">
        <i class='bx bx-left-arrow-alt'></i> Quay lại
      </button>

      <div class="lesson-content" style="background: white; padding: 48px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <div id="image-container" class="lesson-image" style="display: none;"></div>

        <div class="lesson-header-meta">
          <div class="badge badge-primary" id="date-badge">
            <i class='bx bx-calendar'></i> Loading...
          </div>
        </div>

        <h2 id="title" style="font-size: 2.5rem; margin-bottom: 24px; color: var(--text-main);">Loading...</h2>

        <div class="lesson-body" id="content">
          Đang tải nội dung bài học...
        </div>

        <div id="attachment-section" class="attachment-section" style="display:none;">
          <h3 style="font-size: 1.25rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
            <i class='bx bx-paperclip' style="color: var(--primary);"></i> Tài liệu bài học
          </h3>
          
          <div class="attachment-card-modern">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; border-radius: 12px; background: #eff6ff; color: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                <i class='bx bxs-file-pdf'></i>
              </div>
              <div>
                <div style="font-weight: 700; color: #0f172a; font-size: 1rem;">Tài Liệu Đính Kèm</div>
                <div style="font-size: 0.875rem; color: #64748b;">PDF, DOCX hoặc Hình ảnh</div>
              </div>
            </div>
            <div style="display: flex; gap: 12px;">
              <button id="view-button" class="btn btn-secondary btn-sm" onclick="togglePreview()">
                <i class='bx bx-show'></i> Xem nhanh
              </button>
              <a id="download-link" class="btn btn-primary btn-sm" target="_blank" download>
                <i class='bx bx-download'></i> Tải về
              </a>
            </div>
          </div>
          
          <div id="preview-container" style="display:none; margin-top: 24px; width: 100%; height: 750px; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; background: #fff; box-shadow: var(--shadow-lg);">
            <iframe id="preview-frame" style="width: 100%; height: 100%; border: none;"></iframe>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const token = localStorage.getItem("token");
  const userStr = localStorage.getItem("user");
  if (!token || !userStr) window.location.href = "index.html";

  const user = JSON.parse(userStr);
  if (user.role === 'admin') document.getElementById('admin-link').style.display = "flex";

  const displayName = user.name || (user.email ? user.email.split('@')[0] : 'Student');
  document.getElementById('user-name-top').innerText = displayName;
  document.getElementById('user-avatar').innerText = displayName.charAt(0).toUpperCase();

  // Set gender avatar
  function getGenderImg(g) {
    const v = (g || 'male').toLowerCase();
    return (v === 'female' || v === 'girl') ? 'assets/images/female_student.png' : 'assets/images/male_student.png';
  }
  const sidebarAvatar = document.getElementById('sidebar-avatar');
  if (sidebarAvatar) { 
    sidebarAvatar.src = getGenderImg(user.gender); 
    sidebarAvatar.onerror = () => sidebarAvatar.style.display='none'; 
  }

  function logout() { localStorage.clear(); window.location.href = "index.html"; }
  function go(page) { window.location.href = page + ".html"; }

  async function fetchLessonDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if (!id) return window.history.back();

    try {
      const res = await fetch('https://lms-gzty.onrender.com/lessons/' + id, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (!data.success) {
        document.getElementById('title').innerText = "Không tìm thấy bài học";
        document.getElementById('content').innerText = "";
        return;
      }

      const l = data.data;
      document.getElementById('title').innerText = l.title;
      document.getElementById('header-title').innerText = l.title;
      document.getElementById('date-badge').innerHTML = `<i class='bx bx-calendar'></i> Đăng vào ${new Date(l.createdAt).toLocaleDateString('vi-VN')}`;
      document.getElementById('content').innerText = l.content;

      if (l.imageUrl) {
        const imgC = document.getElementById('image-container');
        imgC.style.display = 'block';
        imgC.style.backgroundImage = `url('https://lms-gzty.onrender.com${l.imageUrl}')`;
      }

      if (l.fileUrl) {
        document.getElementById('attachment-section').style.display = 'block';
        const fileFullUrl = 'https://lms-gzty.onrender.com' + l.fileUrl;
        document.getElementById('download-link').href = fileFullUrl;
        
        let viewerUrl;
        const ext = l.fileUrl.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
          viewerUrl = fileFullUrl;
        } else {
          viewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(fileFullUrl)}&embedded=true`;
        }
        document.getElementById('preview-frame').src = viewerUrl;
      }

    } catch (err) {
      console.error(err);
      document.getElementById('title').innerText = "Lỗi tải nội dung";
      document.getElementById('content').innerText = "";
    }
  }

  function togglePreview() {
    const pc = document.getElementById('preview-container');
    const btn = document.getElementById('view-button');
    if (pc.style.display === 'none' || !pc.style.display) {
      pc.style.display = 'block';
      btn.innerHTML = "<i class='bx bx-hide'></i> Ẩn xem nhanh";
      btn.classList.replace('btn-secondary', 'btn-primary');
      pc.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      pc.style.display = 'none';
      btn.innerHTML = "<i class='bx bx-show'></i> Xem nhanh";
      btn.classList.replace('btn-primary', 'btn-secondary');
    }
  }

  fetchLessonDetail();


// Global Dropdown Handler for Student Topbar
document.addEventListener('click', function(e) {
  // Profile Dropdown
  const profileEl = document.getElementById('user-name-top')?.parentElement;
  if (profileEl && profileEl.contains(e.target)) {
    let drop = document.getElementById('student-dropdown');
    if (!drop) {
      drop = document.createElement('div');
      drop.id = 'student-dropdown';
      const rect = profileEl.getBoundingClientRect();
      drop.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 8px 0;
        z-index: 9999;
        min-width: 180px;
        animation: slideDown 0.2s ease-out;
      `;
      drop.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; margin-bottom: 4px;">
          <div style="font-weight: 700; color: #0f172a;" id="drop-name"></div>
          <div style="font-size: 0.8rem; color: #64748b;">Student Account</div>
        </div>
        <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: #ef4444; text-decoration: none; transition: background 0.2s; font-weight: 600;">
          <i class='bx bx-log-out'></i> Log out
        </a>
      `;
      document.body.appendChild(drop);
      document.getElementById('drop-name').innerText = document.getElementById('user-name-top').innerText;
      
      const animStyle = document.createElement('style');
      animStyle.innerHTML = "@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } } #student-dropdown a:hover { background: #fef2f2; }";
      document.head.appendChild(animStyle);
    } else {
      drop.style.display = drop.style.display === 'none' ? 'block' : 'none';
      if(drop.style.display === 'block') {
        const rect = profileEl.getBoundingClientRect();
        drop.style.top = `${rect.bottom + 10}px`;
        drop.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const drop = document.getElementById('student-dropdown');
    if (drop && !e.target.closest('#student-dropdown')) {
      drop.style.display = 'none';
    }
  }
  
  // Notification Bell
  const bellBtn = e.target.closest('button');
  if (bellBtn && bellBtn.querySelector('.bx-bell')) {
    let notif = document.getElementById('student-notif');
    if (!notif) {
      notif = document.createElement('div');
      notif.id = 'student-notif';
      const rect = bellBtn.getBoundingClientRect();
      notif.style.cssText = `
        position: fixed;
        top: ${rect.bottom + 10}px;
        right: ${window.innerWidth - rect.right}px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 0;
        z-index: 9999;
        min-width: 280px;
        animation: slideDown 0.2s ease-out;
      `;
      notif.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 700; color: #0f172a;">
          Notifications
        </div>
        <div style="padding: 20px 16px; text-align: center; color: #64748b; font-size: 0.9rem;">
          <i class='bx bx-bell-off' style="font-size: 24px; color: #cbd5e1; margin-bottom: 8px; display: block;"></i>
          No new notifications
        </div>
      `;
      document.body.appendChild(notif);
    } else {
      notif.style.display = notif.style.display === 'none' ? 'block' : 'none';
      if(notif.style.display === 'block') {
        const rect = bellBtn.getBoundingClientRect();
        notif.style.top = `${rect.bottom + 10}px`;
        notif.style.right = `${window.innerWidth - rect.right}px`;
      }
    }
  } else {
    const notif = document.getElementById('student-notif');
    if (notif && !e.target.closest('#student-notif')) {
      notif.style.display = 'none';
    }
  }
});

</script>
</body>
</html>
