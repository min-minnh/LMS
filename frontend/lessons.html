<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Lessons Management</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <style>
    /* Modal styling */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000;
      justify-content: center; align-items: center; padding: 40px;
    }
    .modal-content {
      background: var(--bg-surface); border-radius: var(--radius-lg); width: 100%; max-width: 900px;
      max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative;
    }
    .modal-header {
      padding: 32px 40px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-body { padding: 40px; display: flex; flex-direction: column; gap: 24px; }
  </style>
  <script src="admin-core.js"></script>
</head>
<body onload="checkAdmin(); initView()">

<div class="app-container">
  <!-- Admin Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class='bx bx-shield-quarter'></i>
        <span>Admin Panel</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <i class='bx bxs-dashboard'></i> Dashboard
      </a>
      <a href="vocabulary.html" class="nav-item">
        <i class='bx bx-book-bookmark'></i> Vocabulary
      </a>
      <a href="lessons.html" class="nav-item active">
        <i class='bx bx-library'></i> Lessons
      </a>
      <a href="users.html" class="nav-item">
        <i class='bx bx-group'></i> Users List
      </a>
      <a href="quizzes.html" class="nav-item">
        <i class='bx bx-edit'></i> Quizzes
      </a>
      <a href="results.html" class="nav-item">
        <i class='bx bx-bar-chart-alt-2'></i> Student Results
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <a href="#" onclick="localStorage.clear(); window.location.href='index.html'" class="nav-item text-danger">
        <i class='bx bx-log-out'></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-search">
        <i class='bx bx-search'></i>
        <input type="text" placeholder="Search...">
      </div>
      <div class="topbar-actions">
        <div class="user-profile">
          <div class="avatar" style="background: var(--warning-light); color: var(--warning);">A</div>
          <span class="font-medium">Administrator</span>
        </div>
      </div>
    </header>

    <div class="content-area">
      <!-- VIEW 1: TOPIC DIRECTORY -->
      <div id="topicsView" class="w-full">
        <div class="page-header mb-4">
          <h1 class="text-main" style="display: flex; align-items: center; gap: 8px;"><i class='bx bx-library'></i> Manage Lesson Folders</h1>
        </div>

        <div class="card mb-6" style="display: flex; gap: 16px; align-items: flex-start;">
          <div style="flex: 1;">
            <label class="form-label">New Lesson Folder</label>
            <input type="text" id="topicName" class="form-control" placeholder="Create a new lesson folder here if needed...">
          </div>
          <button class="btn btn-primary" onclick="addTopic()" style="margin-top: 28px;">
            <i class='bx bx-plus'></i> Create Folder
          </button>
        </div>

        <div class="grid grid-cols-4 gap-6" id="topicGrid">
          <!-- Generated Folders Here -->
        </div>
        <div id="topicPagination" class="pagination mt-4 flex items-center justify-center gap-4"></div>
      </div>

      <!-- VIEW 2: INSIDE A TOPIC (LESSONS LIST) -->
      <div id="lessonsView" style="display: none; width: 100%;">
        
        <div class="flex items-center mb-6" style="gap: 16px;">
          <button class="btn btn-secondary" onclick="goBackToTopics()">
            <i class='bx bx-arrow-back'></i> Back to Folders
          </button>
          <h2 class="text-primary m-0" id="currentTopicTitle" style="margin-bottom: 0;">Topic: ---</h2>
        </div>

        <!-- Create Lesson -->
        <div class="card mb-6">
          <h3 class="font-bold mb-4">Create Lesson Here</h3>
          <div class="form-group">
            <label class="form-label">Lesson Title</label>
            <input type="text" id="title" class="form-control" placeholder="Lesson Title">
          </div>
          <div class="form-group">
            <label class="form-label">Content</label>
            <textarea id="content" class="form-control" placeholder="Lesson Content..." rows="4"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-6 mb-4">
            <div class="form-group m-0">
              <label class="form-label">Cover Image (Optional)</label>
              <input type="file" id="imageFile" accept="image/*" class="form-control">
            </div>
            <div class="form-group m-0">
              <label class="form-label">Attached File / Document (Optional)</label>
              <input type="file" id="documentFile" class="form-control">
            </div>
          </div>
          <button class="btn btn-primary" onclick="addLesson()"><i class='bx bx-save'></i> Save Lesson</button>
        </div>

        <div class="card p-0 table-responsive">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Image</th>
                <th>Date</th>
                <th width="160">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="pagination" class="pagination mt-4 flex items-center justify-center gap-4"></div>
      </div>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="font-bold text-xl text-primary" id="previewTitle">Lesson Title</div>
      <button class="btn-icon" onclick="closePreview()"><i class='bx bx-x text-2xl'></i></button>
    </div>
    <div class="modal-body">
      <div id="previewImage" style="width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: var(--radius-md); display: none;"></div>
      <div id="previewContent" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-main); font-size: 1.0625rem;"></div>
      
      <div id="previewAttachment" style="display: none; flex-direction: column; gap: 16px; border-top: 1px solid var(--border-color); padding-top: 24px;">
        <div class="font-bold text-main" style="display: flex; align-items: center; gap: 8px;"><i class='bx bx-paperclip text-primary text-xl'></i> Tài Liệu Đính Kèm:</div>
        <iframe id="previewIframe" style="width: 100%; height: 600px; border: 1px solid var(--border-color); border-radius: var(--radius-md);"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  let currentTopicId = null;
  let allCurrentLessons = [];

  function initView() {
    document.getElementById('topicsView').style.display = 'block';
    document.getElementById('lessonsView').style.display = 'none';
    loadTopics(1);
  }

  async function loadTopics(page = 1) {
    const res = await apiFetch(`/topics?type=lesson&page=${page}`);
    if(!res.success) return showToast(res.message, false);
    
    const grid = document.getElementById('topicGrid');
    if (res.data.topics.length === 0) {
      grid.innerHTML = '<p class="text-muted col-span-full">No folders yet.</p>';
      return;
    }

    grid.innerHTML = res.data.topics.map(t => `
      <div class="card text-center relative" style="cursor: pointer; transition: transform 0.2s;" onclick="openTopic('${t._id}', '${t.name.replace(/'/g, "\\'")}')" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <i class='bx bxs-book-open text-primary' style="font-size: 48px; margin-bottom: 12px;"></i>
        <h3 class="font-semibold text-main mb-4">${t.name}</h3>
        <button class="btn btn-danger btn-sm text-xs w-full" onclick="event.stopPropagation(); deleteTopic('${t._id}')" style="padding: 6px;">Delete</button>
      </div>
    `).join('');
    
    const pageContainer = document.getElementById('topicPagination');
    if(res.data.totalPages > 1) {
       pageContainer.innerHTML = `
          <button class="btn btn-secondary" ${page === 1 ? 'disabled' : ''} onclick="loadTopics(${page - 1})">Prev</button>
          <span class="text-sm font-medium">Page ${page}/${res.data.totalPages}</span>
          <button class="btn btn-secondary" ${page === res.data.totalPages ? 'disabled' : ''} onclick="loadTopics(${page + 1})">Next</button>
       `;
    } else { pageContainer.innerHTML = ''; }
  }

  async function addTopic() {
    const name = document.getElementById('topicName').value;
    if (!name) return showToast("Folder name is required", false);
    const res = await apiFetch('/topics', { method: 'POST', body: JSON.stringify({ name, type: 'lesson' }) });
    if (res.success) { showToast("Folder generated!"); document.getElementById('topicName').value = ''; loadTopics(1); }
  }

  async function deleteTopic(id) {
    if(!confirm("Are you sure you want to delete the ENTIRE lesson folder?")) return;
    const res = await apiFetch(`/topics/${id}`, { method: 'DELETE' });
    if(res.success) { showToast("Deleted"); loadTopics(1); }
  }

  function openTopic(id, name) {
    currentTopicId = id;
    document.getElementById('topicsView').style.display = 'none';
    document.getElementById('lessonsView').style.display = 'block';
    document.getElementById('currentTopicTitle').innerText = name;
    loadLessonsForTopic(1);
  }

  function goBackToTopics() { currentTopicId = null; initView(); }

  async function loadLessonsForTopic(page = 1) {
    renderSkeleton('tableBody', 4);
    const res = await apiFetch(`/lessons?topicId=${currentTopicId}&page=${page}`);
    if(!res.success) return showToast(res.message, false);
    
    const tbody = document.getElementById('tableBody');
    if (res.data.lessons.length === 0) {
      renderEmptyState('tableBody', 4, "No lessons inside this folder yet.");
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    allCurrentLessons = res.data.lessons;

    tbody.innerHTML = allCurrentLessons.map(l => `
      <tr>
        <td><strong class="text-primary">${l.title}</strong></td>
        <td>${l.imageUrl ? `<img src="https://lms-gzty.onrender.com${l.imageUrl}" style="height:40px; border-radius:4px; object-fit: cover;">` : '<span class="text-muted">No Image</span>'}</td>
        <td class="text-muted text-sm">${new Date(l.createdAt).toLocaleDateString()}</td>
        <td style="display: flex; gap: 8px;">
          <button class="btn btn-secondary btn-sm text-xs" style="padding: 6px 10px;" onclick="previewLesson('${l._id}')"><i class='bx bx-show'></i> View</button>
          <button class="btn btn-danger btn-sm text-xs" style="padding: 6px 10px;" onclick="deleteLesson('${l._id}')"><i class='bx bx-trash'></i> Delete</button>
        </td>
      </tr>
    `).join('');
    buildPagination(res.data.page, res.data.totalPages, loadLessonsForTopic);
  }

  async function addLesson() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const file = document.getElementById('imageFile').files[0];
    const docFile = document.getElementById('documentFile').files[0];
    
    if(!title || !content) return showToast("Title and Content required", false);
    
    const formData = new FormData();
    formData.append('title', title);
    formData.append('content', content);
    formData.append('topicId', currentTopicId);
    if(file) formData.append('image', file);
    if(docFile) formData.append('file', docFile);

    const res = await apiFetch('/lessons', { method: 'POST', body: formData });

    if (res.success) {
      showToast("Lesson added!");
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('imageFile').value = '';
      document.getElementById('documentFile').value = '';
      loadLessonsForTopic(1);
    } else { showToast(res.message, false); }
  }

  async function deleteLesson(id) {
    if(!confirm("Are you sure?")) return;
    const res = await apiFetch(`/lessons/${id}`, { method: 'DELETE' });
    if(res.success) { showToast("Deleted"); loadLessonsForTopic(1); }
  }

  function previewLesson(id) {
    const l = allCurrentLessons.find(x => x._id === id);
    if (!l) return;
    
    document.getElementById('previewTitle').innerText = l.title;
    document.getElementById('previewContent').innerText = l.content;
    
    const imgC = document.getElementById('previewImage');
    if (l.imageUrl) {
      imgC.style.display = 'block';
      imgC.style.backgroundImage = `url('https://lms-gzty.onrender.com${l.imageUrl}')`;
    } else {
      imgC.style.display = 'none';
    }
    
    const attC = document.getElementById('previewAttachment');
    const iframe = document.getElementById('previewIframe');
    if (l.fileUrl) {
      attC.style.display = 'flex';
      const fileFullUrl = 'https://lms-gzty.onrender.com' + l.fileUrl;
      let viewerUrl = fileFullUrl;
      const ext = fileFullUrl.split('.').pop().toLowerCase();
      if (['doc', 'docx', 'ppt', 'pptx', 'xls', 'xlsx'].includes(ext)) {
        viewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(fileFullUrl)}&embedded=true`;
      }
      iframe.src = viewerUrl;
    } else {
      attC.style.display = 'none';
      iframe.src = '';
    }
    
    document.getElementById('previewModal').style.display = 'flex';
  }
  
  function closePreview() {
    document.getElementById('previewModal').style.display = 'none';
    document.getElementById('previewIframe').src = '';
  }
</script>
</body>
</html>
